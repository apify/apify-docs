packages:
  - apify-docs-theme

overrides:
  openapi-to-postmanv2>js-yaml: 4.1.1
  "@stoplight/spectral-core>minimatch": 3.1.5
  copy-webpack-plugin>serialize-javascript: ^7.0.4
  css-minimizer-webpack-plugin>serialize-javascript: ^7.0.4
  "@stoplight/spectral-ruleset-bundler>rollup": 2.80.0
  postcss: ^8.5.10
  yaml@1: ^1.10.3
  lodash: ^4.18.0
  protobufjs: ^8.0.0
  dompurify: ^3.4.0
  fast-xml-parser: ^5.7.0
  uuid@>=11.0.0 <12.0.0: ^14.0.0
  js-yaml@>=4.0.0 <5.0.0: ^4.1.1
  ajv@>=8.0.0 <9.0.0: 8.18.0

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "@apify/*"
  - "@crawlee/*"
  - "apify-client"
  - "apify"
  - "crawlee"
  - "got-scraping"

nodeLinker: hoisted
linkWorkspacePackages: true
preferWorkspacePackages: true
publicHoistPattern:
  - "*"
legacyPeerDeps: true
