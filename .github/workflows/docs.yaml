name: docs

on:
    push:
        branches:
            - master
        # nginx.conf is deployed and invalidated by deploy-nginx.yml; avoid a duplicate here.
        paths-ignore:
            - nginx.conf
    workflow_dispatch:

jobs:
    build:
        environment:
            name: github-pages
        permissions:
            contents: write
            pages: write
            id-token: write
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v7
            -   name: Use Node.js 24
                uses: actions/setup-node@v7
                with:
                    node-version: 24

            -   uses: apify/actions/pnpm-install@v1.3.1

            -   name: Build docs
                run: |
                    pnpm build
                env:
                    APIFY_SIGNING_TOKEN: ${{ secrets.APIFY_SIGNING_TOKEN }}
                    INTERCOM_APP_ID: ${{ secrets.INTERCOM_APP_ID }}
                    SEGMENT_TOKEN: ${{ secrets.SEGMENT_TOKEN }}

            -   name: Set up GitHub Pages
                uses: actions/configure-pages@v6

            -   name: Upload GitHub Pages artifact
                uses: actions/upload-pages-artifact@v5
                with:
                    path: ./build

            -   name: Deploy artifact to GitHub Pages
                uses: actions/deploy-pages@v5

            -   name: Invalidate CloudFront cache
                run: |
                    gh workflow run invalidate-cloudfront.yml \
                        --repo apify/apify-docs-private \
                        --field deployment=apify-docs
                    echo "✅ CloudFront cache invalidation workflow triggered successfully"
                env:
                    GITHUB_TOKEN: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
