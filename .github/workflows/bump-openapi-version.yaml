name: Bump OpenAPI version

on:
    push:
        branches:
            - master
        paths:
            - 'apify-api/**'

jobs:
    bump-version:
        name: Bump OpenAPI version
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                  token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}

            - name: Bump OpenAPI version
              run: echo "v2-$(date -u +%Y-%m-%dT%H%M%SZ)" > apify-api/openapi/components/version.yaml

            - name: Commit changes
              id: commit
              uses: apify/actions/signed-commit@v1.0.0
              with:
                  message: "chore(openapi): Update OpenAPI version [skip ci]"
                  pull: '--rebase --autostash'
                  github-token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}

            # The commit above carries "[skip ci]", so it does not trigger any push-based
            # workflow. Trigger the API client create/update routine from here instead, so a
            # new OpenAPI version always kicks off client regeneration.
            - name: Trigger API client update routine
              env:
                  GITHUB_TOKEN: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
              run: |
                  gh workflow run update-clients.yml \
                      --repo apify/apify-client-orchestration
                  echo "✅ Triggered API client create/update routine in apify-client-orchestration"
