get:
  tags:
    - Actors/Last run
  summary: Get log for last run
  description: |
    Retrieves the log of the last Actor run. Redispatches to [Get log](/api/v2/log-get)
    for the run resolved by this alias.

    Using the `status` query parameter you can ensure to only get a run with a certain status
    (e.g. `status=SUCCEEDED`). Only the most recent run with that status is used.
  operationId: act_runs_last_log_get
  parameters:
    - $ref: ../../components/parameters/actorId.yaml
    - $ref: ../../components/parameters/runs-last/status.yaml
    - name: stream
      in: query
      description: If true, the log will be streamed as it is generated.
      style: form
      explode: true
      schema:
        type: boolean
    - name: download
      in: query
      description: If true, the log will be returned as a downloadable file.
      style: form
      explode: true
      schema:
        type: boolean
    - name: raw
      in: query
      description: If true, the log will be returned without additional metadata.
      style: form
      explode: true
      schema:
        type: boolean
  responses:
    "200":
      description: ""
      headers: {}
      content:
        text/plain:
          schema:
            type: string
            example: "2017-07-14T06:00:49.733Z Application started.\n"
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "404":
      description: Not found - the requested resource was not found.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ErrorResponse.yaml
          examples:
            actor-not-found:
              $ref: ../../components/examples/actor-not-found.yaml
            actor-run-not-found:
              $ref: ../../components/examples/actor-run-not-found.yaml
  deprecated: false
