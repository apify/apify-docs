get:
  tags:
    - Actors/Actor versions
  summary: Get environment variable
  description: |
    Gets a [EnvVar object](#/reference/actors/environment-variable-object) that
    contains all the details about a specific environment variable of an Actor.

    If `isSecret` is set to `true`, then `value` will never be returned.
  operationId: act_version_envVar_get
  parameters:
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/actorId"
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/versionNumber"
    - name: envVarName
      in: path
      description: The name of the environment variable
      required: true
      style: simple
      schema:
        type: string
        example: MY_ENV_VAR
  responses:
    "200":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/actors/EnvVarResponse.yaml
          example:
            data:
              name: MY_ENV_VAR
              value: my-value
              isSecret: false
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "401":
      $ref: ../../components/responses/Unauthorized.yaml
    "403":
      $ref: ../../components/responses/Forbidden.yaml
    "404":
      description: Not found - the requested resource was not found.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "../../components/schemas/common/errors/ActorErrors.yaml#/ActorNotFoundError"
              - $ref: "../../components/schemas/common/errors/ActorErrors.yaml#/ActorVersionNotFoundError"
              - $ref: "../../components/schemas/common/errors/EnvVariableErrors.yaml#/EnvironmentVariableNotFoundError"
    "405":
      $ref: ../../components/responses/MethodNotAllowed.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
  x-legacy-doc-urls:
    - https://docs.apify.com/api/v2#/reference/actors/environment-variable-object/get-environment-variable
    - https://docs.apify.com/api/v2#/reference/actors/get-environment-variable
    - https://docs.apify.com/api/v2#tag/ActorsEnvironment-variable-object/operation/act_version_envVar_get
  x-py-parent: ActorEnvVarClientAsync
  x-py-name: get
  x-py-doc-url: https://docs.apify.com/api/client/python/reference/class/ActorEnvVarClientAsync#get
put:
  $ref: "../../components/objects/actors/acts@{actorId}@versions@{versionNumber}@env-vars@{envVarName}put.yaml#/put"
post:
  $ref: "../../components/objects/actors/acts@{actorId}@versions@{versionNumber}@env-vars@{envVarName}put.yaml#/post"
delete:
  tags:
    - Actors/Actor versions
  summary: Delete environment variable
  description: Deletes a specific environment variable.
  operationId: act_version_envVar_delete
  parameters:
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/actorId"
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/versionNumber"
    - name: envVarName
      in: path
      description: The name of the environment variable
      required: true
      style: simple
      schema:
        type: string
        example: MY_ENV_VAR
  responses:
    "204":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            type: object
            example: {}
          example: {}
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "401":
      $ref: ../../components/responses/Unauthorized.yaml
    "403":
      $ref: ../../components/responses/Forbidden.yaml
    "404":
      description: Not found - the requested resource was not found.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "../../components/schemas/common/errors/ActorErrors.yaml#/ActorNotFoundError"
              - $ref: "../../components/schemas/common/errors/ActorErrors.yaml#/ActorVersionNotFoundError"
              - $ref: "../../components/schemas/common/errors/EnvVariableErrors.yaml#/EnvironmentVariableNotFoundError"
    "405":
      $ref: ../../components/responses/MethodNotAllowed.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
  x-legacy-doc-urls:
    - https://docs.apify.com/api/v2#/reference/actors/environment-variable-object/delete-environment-variable
    - https://docs.apify.com/api/v2#/reference/actors/delete-environment-variable
    - https://docs.apify.com/api/v2#tag/ActorsEnvironment-variable-object/operation/act_version_envVar_delete
