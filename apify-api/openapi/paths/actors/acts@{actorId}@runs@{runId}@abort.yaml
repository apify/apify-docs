post:
  tags:
    - Actors/Actor runs
  summary: Abort run
  description: |
    **[DEPRECATED]** API endpoints related to run of the Actor were moved under
    new namespace [`actor-runs`](#/reference/actor-runs). Aborts an Actor run and
    returns an object that contains all the details about the run.

    Only runs that are starting or running are aborted. For runs with status
    `FINISHED`, `FAILED`, `ABORTING` and `TIMED-OUT` this call does nothing.
  operationId: act_run_abort_post
  parameters:
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/actorId"
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/runId"
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/gracefully"
  responses:
    "200":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/actor-runs/RunResponse.yaml
          example:
            $ref: ../../components/examples/AbortedRunExample.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "404":
      description: Not found - the requested resource was not found.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "../../components/schemas/common/errors/ActorErrors.yaml#/ActorNotFoundError"
              - $ref: "../../components/schemas/common/errors/ActorErrors.yaml#/ActorRunNotFoundError"
  deprecated: true
  x-legacy-doc-urls:
    - https://docs.apify.com/api/v2#/reference/actors/abort-run/abort-run
    - https://docs.apify.com/api/v2#/reference/actors/abort-run
    - https://docs.apify.com/api/v2#tag/ActorsAbort-run/operation/act_run_abort_post
