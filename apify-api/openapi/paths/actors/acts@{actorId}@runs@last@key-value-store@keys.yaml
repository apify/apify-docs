get:
  tags:
    - Actors/Actor runs
  summary: Get key-value store keys for last run
  description: |
    Returns a list of keys from the default key-value store of the last Actor run. Redispatches to
    [Get list of keys](/api/v2/key-value-store-keys-get).

    Using the `status` query parameter you can ensure to only get a run with a certain status
    (e.g. `status=SUCCEEDED`). Only the most recent run with that status is used.
  operationId: act_runs_last_keyValueStore_keys_get
  parameters:
    - $ref: ../../components/parameters/actorId.yaml
    - $ref: ../../components/parameters/runs-last/status.yaml
    - name: exclusiveStartKey
      in: query
      description: All keys up to this one (including) are skipped from the result.
      style: form
      explode: true
      schema:
        type: string
    - name: limit
      in: query
      description: Maximum number of keys to return.
      style: form
      explode: true
      schema:
        type: number
  responses:
    "200":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/key-value-stores/ListOfKeysResponse.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
  deprecated: false
