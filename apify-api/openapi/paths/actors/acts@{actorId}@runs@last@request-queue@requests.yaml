get:
  tags:
    - Actors/Last run
  summary: List requests in queue for last run
  description: |
    Returns requests from the default request queue of the last Actor run. Redispatches to
    [List requests](/api/v2/request-queue-requests-get).

    Using the `status` query parameter you can ensure to only get a run with a certain status
    (e.g. `status=SUCCEEDED`). Only the most recent run with that status is used.
  operationId: act_runs_last_requestQueue_requests_get
  parameters:
    - $ref: ../../components/parameters/actorId.yaml
    - $ref: ../../components/parameters/runs-last/status.yaml
    - name: exclusiveStartId
      in: query
      description: All requests up to this one (including) are skipped from the result.
      style: form
      explode: true
      schema:
        type: string
    - name: limit
      in: query
      description: Maximum number of requests to return.
      style: form
      explode: true
      schema:
        type: number
        example: 100
  responses:
    "200":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/request-queues/ListOfRequestsResponse.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
  deprecated: false
post:
  tags:
    - Actors/Last run
  summary: Add request to queue for last run
  description: |
    Adds a request to the default request queue of the last Actor run. Redispatches to
    [Add request](/api/v2/request-queue-requests-post).

    Using the `status` query parameter you can ensure to only get a run with a certain status
    (e.g. `status=SUCCEEDED`). Only the most recent run with that status is used.
  operationId: act_runs_last_requestQueue_requests_post
  parameters:
    - $ref: ../../components/parameters/actorId.yaml
    - $ref: ../../components/parameters/runs-last/status.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/request-queues/RequestDraft.yaml
  responses:
    "201":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/request-queues/AddRequestResponse.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
  deprecated: false
