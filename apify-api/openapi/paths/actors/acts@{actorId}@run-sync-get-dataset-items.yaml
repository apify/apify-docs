post:
  tags:
    - Actors/Actor runs
  summary: Run Actor synchronously with input and get dataset items
  description: |
    Runs a specific Actor and returns its dataset items.

    The POST payload including its `Content-Type` header is passed as `INPUT` to
    the Actor (usually `application/json`).
    The HTTP response contains the Actors dataset items, while the format of
    items depends on specifying dataset items' `format` parameter.

    You can send all the same options in parameters as the [Get Dataset
    Items](#/reference/datasets/item-collection/get-items) API endpoint.

    The Actor is started with the default options; you can override them using
    URL query parameters.
    If the Actor run exceeds 300<!-- MAX_ACTOR_JOB_SYNC_WAIT_SECS --> seconds,
    the HTTP response will return the 408 status code (Request Timeout).

    Beware that it might be impossible to maintain an idle HTTP connection for a
    long period of time,
    due to client timeout or network conditions. Make sure your HTTP client is
    configured to have a long enough connection timeout.
    If the connection breaks, you will not receive any information about the run
    and its status.

    To run the Actor asynchronously, use the [Run
    Actor](#/reference/actors/run-collection/run-actor) API endpoint instead.
  operationId: act_runSyncGetDatasetItems_post
  parameters:
    - $ref: "../../components/parameters/runAndBuildOptions.yaml#/actorId"
    - $ref: "../../components/parameters/runAndBuildOptions.yaml#/timeout"
    - $ref: "../../components/parameters/runAndBuildOptions.yaml#/memory"
    - $ref: "../../components/parameters/runAndBuildOptions.yaml#/maxItems"
    - $ref: "../../components/parameters/runAndBuildOptions.yaml#/maxTotalChargeUsd"
    - $ref: "../../components/parameters/runAndBuildOptions.yaml#/restartOnError"
    - $ref: "../../components/parameters/runAndBuildOptions.yaml#/build"
    - $ref: "../../components/parameters/runAndBuildOptions.yaml#/webhooks"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Format"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Clean"
    - $ref: "../../components/parameters/PaginationParameters.yaml#/Offset"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Limit"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Fields"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Omit"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Unwind"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Flatten"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Desc"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Attachment"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Delimiter"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Bom"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/XmlRoot"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/XmlRow"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/SkipHeaderRow"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/SkipHidden"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/SkipEmpty"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Simplified"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/SkipFailedPages"
  requestBody:
    description: ""
    content:
      application/json:
        schema:
          type: object
        example:
          foo: bar
    required: true
  responses:
    "201":
      description: ""
      headers:
        X-Apify-Pagination-Offset:
          content:
            text/plain:
              schema:
                type: string
              example: "0"
        X-Apify-Pagination-Limit:
          content:
            text/plain:
              schema:
                type: string
              example: "100"
        X-Apify-Pagination-Count:
          content:
            text/plain:
              schema:
                type: string
              example: "100"
        X-Apify-Pagination-Total:
          content:
            text/plain:
              schema:
                type: string
              example: "10204"
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
          example:
            - myValue: some value
              myOtherValue: some other value
    "400":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/common/errors/ActorErrors.yaml#/ActorRunFailedError"
    "404":
      description: Not found - the requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/common/errors/ActorErrors.yaml#/ActorNotFoundError"
    "408":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/common/errors/ActorErrors.yaml#/ActorRunTimeoutExceededError"
  deprecated: false
  x-legacy-doc-urls:
    - https://docs.apify.com/api/v2#/reference/actors/run-actor-synchronously-and-get-dataset-items/run-actor-synchronously-with-input-and-get-dataset-items
    - https://docs.apify.com/api/v2#/reference/actors/run-actor-synchronously-with-input-and-get-dataset-items
    - https://docs.apify.com/api/v2#tag/ActorsRun-Actor-synchronously-and-get-dataset-items/operation/act_runSyncGetDatasetItems_post
get:
  tags:
    - Actors/Actor runs
  summary: Run Actor synchronously without input and get dataset items
  description: |
    Runs a specific Actor and returns its dataset items.
    The run must finish in 300<!-- MAX_ACTOR_JOB_SYNC_WAIT_SECS --> seconds
    otherwise the API endpoint returns a timeout error.
    The Actor is not passed any input.

    It allows to send all possible options in parameters from [Get Dataset
    Items](#/reference/datasets/item-collection/get-items) API endpoint.

    Beware that it might be impossible to maintain an idle HTTP connection for a
    long period of time,
    due to client timeout or network conditions. Make sure your HTTP client is
    configured to have a long enough connection timeout.
    If the connection breaks, you will not receive any information about the run
    and its status.

    To run the Actor asynchronously, use the [Run
    Actor](#/reference/actors/run-collection/run-actor) API endpoint instead.
  operationId: act_runSyncGetDatasetItems_get
  parameters:
    - $ref: "../../components/parameters/runAndBuildOptions.yaml#/actorId"
    - $ref: "../../components/parameters/runAndBuildOptions.yaml#/timeout"
    - $ref: "../../components/parameters/runAndBuildOptions.yaml#/memory"
    - $ref: "../../components/parameters/runAndBuildOptions.yaml#/maxItems"
    - $ref: "../../components/parameters/runAndBuildOptions.yaml#/maxTotalChargeUsd"
    - $ref: "../../components/parameters/runAndBuildOptions.yaml#/restartOnError"
    - $ref: "../../components/parameters/runAndBuildOptions.yaml#/build"
    - $ref: "../../components/parameters/runAndBuildOptions.yaml#/webhooks"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Format"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Clean"
    - $ref: "../../components/parameters/PaginationParameters.yaml#/Offset"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Limit"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Fields"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Omit"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Unwind"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Flatten"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Desc"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Attachment"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Delimiter"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Bom"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/XmlRoot"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/XmlRow"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/SkipHeaderRow"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/SkipHidden"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/SkipEmpty"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/Simplified"
    - $ref: "../../components/parameters/DatasetItemsParameters.yaml#/SkipFailedPages"
  responses:
    "201":
      description: ""
      headers:
        X-Apify-Pagination-Offset:
          content:
            text/plain:
              schema:
                type: string
              example: "0"
        X-Apify-Pagination-Limit:
          content:
            text/plain:
              schema:
                type: string
              example: "100"
        X-Apify-Pagination-Count:
          content:
            text/plain:
              schema:
                type: string
              example: "100"
        X-Apify-Pagination-Total:
          content:
            text/plain:
              schema:
                type: string
              example: "10204"
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
          example:
            - myValue: some value
              myOtherValue: some other value
    "400":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/common/errors/ActorErrors.yaml#/ActorRunFailedError"
    "404":
      description: Not found - the requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/common/errors/ActorErrors.yaml#/ActorNotFoundError"
    "408":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/common/errors/ActorErrors.yaml#/ActorRunTimeoutExceededError"
  deprecated: false
  x-legacy-doc-urls:
    - https://docs.apify.com/api/v2#/reference/actors/run-actor-synchronously-and-get-dataset-items/run-actor-synchronously-without-input-and-get-dataset-items
    - https://docs.apify.com/api/v2#/reference/actors/run-actor-synchronously-without-input-and-get-dataset-items
    - https://docs.apify.com/api/v2#tag/ActorsRun-Actor-synchronously-and-get-dataset-items/operation/act_runSyncGetDatasetItems_get
