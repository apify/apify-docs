get:
  tags:
    - Actors/Actor runs
  summary: Get record from key-value store of last run
  description: |
    Returns a record from the default key-value store of the last Actor run. Redispatches to
    [Get record](/api/v2/key-value-store-record-get).

    Using the `status` query parameter you can ensure to only get a run with a certain status
    (e.g. `status=SUCCEEDED`). Only the most recent run with that status is used.
  operationId: act_runs_last_keyValueStore_record_get
  parameters:
    - $ref: ../../components/parameters/actorId.yaml
    - name: recordKey
      in: path
      description: The key of the record in the key-value store.
      required: true
      style: simple
      schema:
        type: string
        example: INPUT
    - $ref: ../../components/parameters/runs-last/status.yaml
  responses:
    "200":
      description: The record value. Content depends on the stored content type.
      headers: {}
      content:
        application/json:
          schema:
            type: object
    "400":
      $ref: ../../components/responses/BadRequest.yaml
  deprecated: false
put:
  tags:
    - Actors/Actor runs
  summary: Put record in key-value store of last run
  description: |
    Stores a record in the default key-value store of the last Actor run. Redispatches to
    [Put record](/api/v2/key-value-store-record-put).

    Using the `status` query parameter you can ensure to only get a run with a certain status
    (e.g. `status=SUCCEEDED`). Only the most recent run with that status is used.
  operationId: act_runs_last_keyValueStore_record_put
  parameters:
    - $ref: ../../components/parameters/actorId.yaml
    - name: recordKey
      in: path
      description: The key of the record in the key-value store.
      required: true
      style: simple
      schema:
        type: string
        example: INPUT
    - $ref: ../../components/parameters/runs-last/status.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
  responses:
    "200":
      description: The record was saved.
      headers: {}
    "400":
      $ref: ../../components/responses/BadRequest.yaml
  deprecated: false
