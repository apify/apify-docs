get:
  tags:
    - Actors/Last run
  summary: Get request from queue for last run
  description: |
    Returns a request from the default request queue of the last Actor run. Redispatches to
    [Get request](/api/v2/request-queue-request-get).

    Using the `status` query parameter you can ensure to only get a run with a certain status
    (e.g. `status=SUCCEEDED`). Only the most recent run with that status is used.
  operationId: act_runs_last_requestQueue_request_get
  parameters:
    - $ref: ../../components/parameters/actorId.yaml
    - name: requestId
      in: path
      description: Request ID.
      required: true
      style: simple
      schema:
        type: string
        example: xpsmkDlspokDSmklS
    - $ref: ../../components/parameters/runs-last/status.yaml
  responses:
    "200":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/request-queues/RequestResponse.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "404":
      description: Not found - the requested resource was not found.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ErrorResponse.yaml
          examples:
            actor-not-found:
              $ref: ../../components/examples/actor-not-found.yaml
            actor-run-not-found:
              $ref: ../../components/examples/actor-run-not-found.yaml
  deprecated: false
