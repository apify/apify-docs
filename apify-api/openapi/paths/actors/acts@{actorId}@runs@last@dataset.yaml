get:
  tags:
    - Actors/Last run
  summary: Get dataset for last run
  description: |
    Returns the default dataset of the last Actor run. Redispatches to [Get dataset](/api/v2/dataset-get).

    Using the `status` query parameter you can ensure to only get a run with a certain status
    (e.g. `status=SUCCEEDED`). Only the most recent run with that status is used.
  operationId: act_runs_last_dataset_get
  parameters:
    - $ref: ../../components/parameters/actorId.yaml
    - $ref: ../../components/parameters/runs-last/status.yaml
  responses:
    "200":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/datasets/DatasetResponse.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
  deprecated: false
