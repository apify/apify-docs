post:
  tags:
    - Actors/Last run
  summary: Reboot last run
  description: |
    Reboots the last Actor run. Redispatches to [Reboot run](/api/v2/actor-run-reboot-post).

    Using the `status` query parameter you can ensure to only get a run with a certain status
    (e.g. `status=SUCCEEDED`). Only the most recent run with that status is used.
  operationId: act_runs_last_reboot_post
  parameters:
    - $ref: ../../components/parameters/actorId.yaml
    - $ref: ../../components/parameters/runs-last/status.yaml
  responses:
    "200":
      $ref: ../../components/responses/actor-runs/reboot.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
  deprecated: false
