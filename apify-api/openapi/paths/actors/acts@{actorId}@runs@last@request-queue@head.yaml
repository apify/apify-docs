get:
  tags:
    - Actors/Last run
  summary: Get queue head for last run
  description: |
    Returns the first requests from the default request queue of the last Actor run. Redispatches to
    [Get head](/api/v2/request-queue-head-get).

    Using the `status` query parameter you can ensure to only get a run with a certain status
    (e.g. `status=SUCCEEDED`). Only the most recent run with that status is used.
  operationId: act_runs_last_requestQueue_head_get
  parameters:
    - $ref: ../../components/parameters/actorId.yaml
    - $ref: ../../components/parameters/runs-last/status.yaml
    - name: limit
      in: query
      description: Maximum number of requests to return.
      style: form
      explode: true
      schema:
        type: number
        example: 100
    - name: clientKey
      in: query
      description: A unique identifier of the client accessing the request queue.
      style: form
      explode: true
      schema:
        type: string
  responses:
    "200":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/request-queues/HeadResponse.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "404":
      description: Not found - the requested resource was not found.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ErrorResponse.yaml
          examples:
            actor-not-found:
              $ref: ../../components/examples/actor-not-found.yaml
            actor-run-not-found:
              $ref: ../../components/examples/actor-run-not-found.yaml
  deprecated: false
