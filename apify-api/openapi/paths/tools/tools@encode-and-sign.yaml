post:
  tags:
    - Tools
  summary: Encode and sign object
  description: |
    Encodes and signs any JSON object. The encoded value includes a signature
    tied to the authenticated user's ID, which can later be verified using the
    decode-and-verify endpoint.

    **Important**: The request must specify the `Content-Type: application/json`
    HTTP header.
  operationId: tools_encode_and_sign_post
  requestBody:
    description: ""
    content:
      application/json:
        schema:
          type: object
        example: {"key": "value"}
    required: true
  responses:
    "200":
      description: ""
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/tools/EncodeAndSignResponse.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "401":
      $ref: ../../components/responses/Unauthorized.yaml
    "403":
      $ref: ../../components/responses/Forbidden.yaml
    "405":
      $ref: ../../components/responses/MethodNotAllowed.yaml
    "413":
      $ref: ../../components/responses/PayloadTooLarge.yaml
    "415":
      $ref: ../../components/responses/UnsupportedMediaType.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
