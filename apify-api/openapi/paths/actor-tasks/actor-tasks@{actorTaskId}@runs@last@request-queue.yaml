get:
  tags:
    - Actor tasks
  summary: Get request queue for last run
  description: |
    Returns the default request queue of the last actor task run. Redispatches to
    [Get request queue](/api/v2/request-queue-get).

    Using the `status` query parameter you can ensure to only get a run with a certain status
    (e.g. `status=SUCCEEDED`). Only the most recent run with that status is used.
  operationId: actorTask_runs_last_requestQueue_get
  parameters:
    - $ref: ../../components/parameters/actorTaskId.yaml
    - $ref: ../../components/parameters/runs-last/status.yaml
  responses:
    "200":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/request-queues/RequestQueueResponse.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
  deprecated: false
