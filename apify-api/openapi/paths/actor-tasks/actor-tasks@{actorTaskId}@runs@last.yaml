get:
  tags:
    - Actor tasks
  summary: Get last run
  description: |
    This is not a single endpoint, but an entire group of endpoints that lets you to
    retrieve and manage the last run of given actor task or any of its default storages.
    All the endpoints require an authentication token.

    The base path represents the last actor task run object is:

    `/v2/actor-tasks/{actorTaskId}/runs/last{?token,status,origin}`

    Using the `status` query parameter you can ensure to only get a run with a certain status
    (e.g. `status=SUCCEEDED`). Similarly, the `origin` query parameter filters runs by the means
    by which they were started (e.g. `origin=API`). The output of this endpoint and other query
    parameters are the same as in the [Run object](/api/v2/actor-run-get) endpoint.

    ##### Convenience endpoints for last Actor task run

    * [Dataset](/api/v2/last-actor-task-runs-default-dataset)

    * [Key-value store](/api/v2/last-actor-task-runs-default-key-value-store)

    * [Request queue](/api/v2/last-actor-task-runs-default-request-queue)

    * [Log](/api/v2/last-actor-task-runs-log)

  operationId: actorTask_runs_last_get
  parameters:
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/actorTaskId"
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/statusLastRun"
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/originLastRun"
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/waitForFinishRun"
  responses:
    "200":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                $ref: ../../components/schemas/actor-runs/Run.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "401":
      $ref: ../../components/responses/Unauthorized.yaml
    "403":
      $ref: ../../components/responses/Forbidden.yaml
    "404":
      $ref: ../../components/responses/NotFound.yaml
    "405":
      $ref: ../../components/responses/MethodNotAllowed.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
  x-legacy-doc-urls:
    - https://docs.apify.com/api/v2#/reference/actor-tasks/last-run-object-and-its-storages
