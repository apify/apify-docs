get:
  tags:
    - Actor tasks
  summary: Get request from queue for last run
  description: |
    Returns a request from the default request queue of the last actor task run. Redispatches to
    [Get request](/api/v2/request-queue-request-get).

    Using the `status` query parameter you can ensure to only get a run with a certain status
    (e.g. `status=SUCCEEDED`). Only the most recent run with that status is used.
  operationId: actorTask_runs_last_requestQueue_request_get
  parameters:
    - $ref: ../../components/parameters/actorTaskId.yaml
    - name: requestId
      in: path
      description: Request ID.
      required: true
      style: simple
      schema:
        type: string
        example: xpsmkDlspokDSmklS
    - $ref: ../../components/parameters/runs-last/status.yaml
  responses:
    "200":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/request-queues/RequestResponse.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
  deprecated: false
