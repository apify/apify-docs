post:
  tags:
    - Actor tasks
  summary: Metamorph last run
  description: |
    Transforms the last actor task run into a run of another Actor. Redispatches to
    [Metamorph run](/api/v2/actor-run-metamorph-post).

    Using the `status` query parameter you can ensure to only get a run with a certain status
    (e.g. `status=SUCCEEDED`). Only the most recent run with that status is used.
  operationId: actorTask_runs_last_metamorph_post
  parameters:
    - $ref: ../../components/parameters/actorTaskId.yaml
    - $ref: ../../components/parameters/runs-last/status.yaml
    - $ref: ../../components/parameters/metamorph/targetActorId.yaml
    - $ref: ../../components/parameters/metamorph/build.yaml
  responses:
    "200":
      $ref: ../../components/responses/actor-runs/metamorph.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "404":
      description: Not found - the requested resource was not found.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/ErrorResponse.yaml
          examples:
            actor-not-found:
              $ref: ../../components/examples/actor-not-found.yaml
            actor-run-not-found:
              $ref: ../../components/examples/actor-run-not-found.yaml
  deprecated: false
