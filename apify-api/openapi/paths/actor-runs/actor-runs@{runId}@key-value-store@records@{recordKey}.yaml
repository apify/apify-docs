get:
  tags:
    - Actor runs/Key-value store
  summary: Get record
  description: |
    Gets a value stored in the Actor run's default key-value store under a specific key.

    This endpoint is a shortcut that resolves the run's `defaultKeyValueStoreId` and proxies to the
    [Get record](/api/v2/keyValueStore-record-get) endpoint.
  operationId: actorRun_keyValueStore_record_get
  parameters:
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/runId"
    - $ref: "../../components/parameters/storageParameters.yaml#/recordKey"
    - name: attachment
      in: query
      description: |
        If `true` or `1`, the response will be served with `Content-Disposition: attachment` header,
        causing web browsers to offer downloading HTML records instead of displaying them.
      required: false
      style: form
      schema:
        type: boolean
        example: true
  responses:
    "200":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/key-value-stores/RecordResponse.yaml
        "*/*":
          schema: {}
    "302":
      description: ""
      headers:
        Location:
          content:
            text/plain:
              schema:
                type: string
              example: >-
                https://apifier-key-value-store-prod.s3.amazonaws.com/tqx6jeMia43gYY6eE/INPUT?AWSAccessKeyId=NKDOUN&Expires=1502720992&Signature=DKLVPI4lDDKC
      content: {}
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "401":
      $ref: ../../components/responses/Unauthorized.yaml
    "403":
      $ref: ../../components/responses/Forbidden.yaml
    "404":
      description: Not found - the requested resource was not found.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "../../components/schemas/common/errors/StorageErrors.yaml#/KeyValueStoreNotFoundError"
              - $ref: "../../components/schemas/common/errors/StorageErrors.yaml#/RecordNotFoundError"
    "405":
      $ref: ../../components/responses/MethodNotAllowed.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
head:
  tags:
    - Actor runs/Key-value store
  summary: Check if a record exists
  description: |
    Check if a value is stored in the Actor run's default key-value store under a specific key.
  operationId: actorRun_keyValueStore_record_head
  parameters:
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/runId"
    - $ref: "../../components/parameters/storageParameters.yaml#/recordKey"
  responses:
    "200":
      description: The record exists
      headers: {}
    "404":
      description: The record does not exist
      headers: {}
  deprecated: false
put:
  tags:
    - Actor runs/Key-value store
  summary: Store record
  description: |
    Stores a value under a specific key to the Actor run's default key-value store.

    This endpoint is a shortcut that resolves the run's `defaultKeyValueStoreId` and proxies to the
    [Store record](/api/v2/keyValueStore-record-put) endpoint.
  operationId: actorRun_keyValueStore_record_put
  parameters:
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/runId"
    - $ref: "../../components/parameters/storageParameters.yaml#/recordKey"
    - name: Content-Encoding
      in: header
      description: ""
      required: false
      style: simple
      schema:
        enum:
          - gzip
          - deflate
          - br
        type: string
  requestBody:
    description: ""
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/key-value-stores/PutRecordRequest.yaml
      "*/*":
        schema: {}
    required: true
  responses:
    "201":
      description: ""
      headers:
        Location:
          content:
            text/plain:
              schema:
                type: string
              example: >-
                https://api.apify.com/v2/key-value-stores/WkzbQMuFYuamGv3YF/records/some-key
      content:
        application/json:
          schema:
            type: object
          example: {}
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "401":
      $ref: ../../components/responses/Unauthorized.yaml
    "403":
      $ref: ../../components/responses/Forbidden.yaml
    "405":
      $ref: ../../components/responses/MethodNotAllowed.yaml
    "413":
      $ref: ../../components/responses/PayloadTooLarge.yaml
    "415":
      $ref: ../../components/responses/UnsupportedMediaType.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
