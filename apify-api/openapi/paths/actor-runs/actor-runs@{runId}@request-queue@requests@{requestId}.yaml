get:
  tags:
    - Actor runs/Request queue
  summary: Get request
  description: |
    Returns a request from the Actor run's default request queue.

    This endpoint is a shortcut that resolves the run's `defaultRequestQueueId` and proxies to the
    [Get request](/api/v2/requestQueue-request-get) endpoint.
  operationId: actorRun_requestQueue_request_get
  parameters:
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/runId"
    - $ref: "../../components/parameters/storageParameters.yaml#/requestId"
  responses:
    "200":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/request-queues/RequestResponse.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "401":
      $ref: ../../components/responses/Unauthorized.yaml
    "403":
      $ref: ../../components/responses/Forbidden.yaml
    "404":
      description: Not found - the requested resource was not found.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "../../components/schemas/common/errors/StorageErrors.yaml#/RequestQueueNotFoundError"
              - $ref: "../../components/schemas/common/errors/StorageErrors.yaml#/RequestNotFoundError"
    "405":
      $ref: ../../components/responses/MethodNotAllowed.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
put:
  tags:
    - Actor runs/Request queue
  summary: Update request
  description: |
    Updates a request in the Actor run's default request queue.

    This endpoint is a shortcut that resolves the run's `defaultRequestQueueId` and proxies to the
    [Update request](/api/v2/requestQueue-request-put) endpoint.
  operationId: actorRun_requestQueue_request_put
  parameters:
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/runId"
    - $ref: "../../components/parameters/storageParameters.yaml#/requestId"
    - $ref: "../../components/parameters/storageParameters.yaml#/forefront"
    - $ref: "../../components/parameters/storageParameters.yaml#/clientKey"
  requestBody:
    description: ""
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/request-queues/Request.yaml
    required: true
  responses:
    "200":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/request-queues/UpdateRequestResponse.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "401":
      $ref: ../../components/responses/Unauthorized.yaml
    "403":
      $ref: ../../components/responses/Forbidden.yaml
    "404":
      description: Not found - the requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/common/errors/StorageErrors.yaml#/RequestQueueNotFoundError"
    "405":
      $ref: ../../components/responses/MethodNotAllowed.yaml
    "413":
      $ref: ../../components/responses/PayloadTooLarge.yaml
    "415":
      $ref: ../../components/responses/UnsupportedMediaType.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
delete:
  tags:
    - Actor runs/Request queue
  summary: Delete request
  description: |
    Deletes a request from the Actor run's default request queue.
  operationId: actorRun_requestQueue_request_delete
  parameters:
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/runId"
    - $ref: "../../components/parameters/storageParameters.yaml#/requestId"
    - $ref: "../../components/parameters/storageParameters.yaml#/clientKey"
  responses:
    "204":
      $ref: ../../components/responses/NoContent.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "401":
      $ref: ../../components/responses/Unauthorized.yaml
    "403":
      $ref: ../../components/responses/Forbidden.yaml
    "404":
      description: Not found - the requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/common/errors/StorageErrors.yaml#/RequestQueueNotFoundError"
    "405":
      $ref: ../../components/responses/MethodNotAllowed.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
