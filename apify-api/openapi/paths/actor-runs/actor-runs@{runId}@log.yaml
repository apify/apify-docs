get:
  tags:
    - Actor runs
  summary: Get log
  description: |
    Returns the log for an Actor run.

    This endpoint is a shortcut for getting the run's log using the
    [Get log](/api/v2/log-get) endpoint with the run ID.

    This endpoint has the same response as the [Get log](/api/v2/log-get) endpoint.
  operationId: actorRun_log_get
  parameters:
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/runId"
    - $ref: "../../components/parameters/logOptions.yaml#/stream"
    - $ref: "../../components/parameters/logOptions.yaml#/download"
    - name: raw
      in: query
      description: |
        If `true` or `1`, the logs will be kept verbatim. By default, the API removes
        ANSI escape codes from the logs, keeping only printable characters.
      required: false
      style: form
      explode: true
      schema:
        type: boolean
        example: false
  responses:
    "200":
      description: ""
      headers: {}
      content:
        text/plain:
          schema:
            type: string
            example: |
              2017-07-14T06:00:49.733Z Application started.
              2017-07-14T06:00:49.741Z Input: { test: 123 }
              2017-07-14T06:00:49.752Z Some useful debug information follows.
          example: |
            2017-07-14T06:00:49.733Z Application started.
            2017-07-14T06:00:49.741Z Input: { test: 123 }
            2017-07-14T06:00:49.752Z Some useful debug information follows.
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "401":
      $ref: ../../components/responses/Unauthorized.yaml
    "403":
      $ref: ../../components/responses/Forbidden.yaml
    "404":
      $ref: ../../components/responses/NotFound.yaml
    "405":
      $ref: ../../components/responses/MethodNotAllowed.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
