get:
  tags:
    - Actor runs
  summary: Get default request queue
  description: |
    Returns the default request queue associated with an Actor run.

    This endpoint is a shortcut for getting the run's `defaultRequestQueueId` and then using the
    [Get request queue](/api/v2/requestQueue-get) endpoint.

    This endpoint has the same response as the [Get request queue](/api/v2/requestQueue-get) endpoint.
  operationId: actorRun_requestQueue_get
  parameters:
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/runId"
  responses:
    "200":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/request-queues/RequestQueueResponse.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "401":
      $ref: ../../components/responses/Unauthorized.yaml
    "403":
      $ref: ../../components/responses/Forbidden.yaml
    "404":
      $ref: ../../components/responses/NotFound.yaml
    "405":
      $ref: ../../components/responses/MethodNotAllowed.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
