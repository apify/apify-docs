post:
  tags:
    - Actor runs
  summary: Resurrect run
  description: |
    Resurrects a finished Actor run and returns an object that contains all the details about the resurrected run.
    Only finished runs, i.e. runs with status `FINISHED`, `FAILED`, `ABORTED` and `TIMED-OUT` can be resurrected.
    Run status will be updated to RUNNING and its container will be restarted with the same storages
    (the same behaviour as when the run gets migrated to the new server).

    For more information, see the [Actor docs](https://docs.apify.com/platform/actors/running/runs-and-builds#resurrection-of-finished-run).
  operationId: PostResurrectRun
  parameters:
    - name: runId
      in: path
      required: true
      schema:
        type: string
      example: 3KH8gEpp4d8uQSe8T
      description: Run ID.
    - name: build
      in: query
      required: false
      schema:
        type: string
      example: 0.1.234
      description: Specifies the Actor build to run. It can be either a build tag or build number. By default, the run is resurrected with the same build that it originally used. Specifically, if a run is first started with the `latest` tag, which resolves to version `0.0.3` at the time, a run resurrected without the `build` parameter will continue running with the version `0.0.3`, even if the `latest` tag already points to a newer build.
    - name: timeout
      in: query
      required: false
      schema:
        type: number
      example: 60
      description: Optional timeout for the run, in seconds. By default, the run uses a timeout specified in the run that is being resurrected.
    - name: memory
      in: query
      required: false
      schema:
        type: number
      example: 256
    - $ref: ../../components/parameters/actor-run-options/maxItems.yaml
    - $ref: ../../components/parameters/actor-run-options/maxTotalChargeUsd.yaml
    - name: restartOnError
      in: query
      required: false
      schema:
        type: boolean
      example: false
      description: |
        Determines whether the resurrected run will be restarted if it fails. By default, the resurrected run uses the same setting as before.
  responses:
    "200":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/actor-runs/RunResponse.yaml

    "400":
      $ref: ../../components/responses/BadRequest.yaml
  deprecated: false
  x-legacy-doc-urls:
    - https://docs.apify.com/api/v2#/reference/actor-runs/resurrect-run/resurrect-run
    - https://docs.apify.com/api/v2#/reference/actor-runs/resurrect-run
    - https://docs.apify.com/api/v2#tag/Actor-runsResurrect-run/operation/PostResurrectRun
  x-js-parent: RunClient
  x-js-name: resurrect
  x-js-doc-url: https://docs.apify.com/api/client/js/reference/class/RunClient#resurrect
  x-py-parent: RunClientAsync
  x-py-name: resurrect
  x-py-doc-url: https://docs.apify.com/api/client/python/reference/class/RunClientAsync#resurrect
