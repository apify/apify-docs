get:
  tags:
    - Actor runs/Request queue
  summary: List requests
  description: |
    Returns a list of requests from the Actor run's default request queue.

    This endpoint is a shortcut that resolves the run's `defaultRequestQueueId` and proxies to the
    [List requests](/api/v2/requestQueue-requests-get) endpoint.
  operationId: actorRun_requestQueue_requests_get
  parameters:
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/runId"
    - $ref: "../../components/parameters/storageParameters.yaml#/clientKey"
    - name: exclusiveStartId
      in: query
      description: All requests up to this one (including) are skipped from the result. (Deprecated, use `cursor` instead.)
      deprecated: true
      style: form
      explode: true
      schema:
        type: string
        example: Ihnsp8YrvJ8102Kj
    - name: limit
      in: query
      description: Number of keys to be returned. Maximum value is `10000`.
      style: form
      explode: true
      schema:
        type: number
        format: double
        example: 100
    - name: cursor
      in: query
      description: A cursor string for pagination, returned in the previous response as `nextCursor`. Use this to retrieve the next page of requests.
      style: form
      explode: true
      schema:
        type: string
        example: eyJyZXF1ZXN0SWQiOiI2OFRqQ2RaTDNvM2hiUU0ifQ
    - name: filter
      in: query
      description: Filter requests by their state. Possible values are `locked` and `pending`. (Is not compatible with deprecated `exclusiveStartId` parameter.)
      style: form
      explode: true
      schema:
        type: string
        enum:
          - locked
          - pending
        example: locked
  responses:
    "200":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/request-queues/ListOfRequestsResponse.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "401":
      $ref: ../../components/responses/Unauthorized.yaml
    "403":
      $ref: ../../components/responses/Forbidden.yaml
    "404":
      description: Not found - the requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/common/errors/StorageErrors.yaml#/RequestQueueNotFoundError"
    "405":
      $ref: ../../components/responses/MethodNotAllowed.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
post:
  tags:
    - Actor runs/Request queue
  summary: Add request
  description: |
    Adds a request to the Actor run's default request queue.

    This endpoint is a shortcut that resolves the run's `defaultRequestQueueId` and proxies to the
    [Add request](/api/v2/requestQueue-requests-post) endpoint.
  operationId: actorRun_requestQueue_requests_post
  parameters:
    - $ref: "../../components/parameters/runAndBuildParameters.yaml#/runId"
    - $ref: "../../components/parameters/storageParameters.yaml#/clientKey"
    - $ref: "../../components/parameters/storageParameters.yaml#/forefront"
  requestBody:
    description: ""
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/request-queues/RequestWithoutId.yaml
    required: true
  responses:
    "201":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/request-queues/AddRequestResponse.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "401":
      $ref: ../../components/responses/Unauthorized.yaml
    "403":
      $ref: ../../components/responses/Forbidden.yaml
    "404":
      description: Not found - the requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/common/errors/StorageErrors.yaml#/RequestQueueNotFoundError"
    "405":
      $ref: ../../components/responses/MethodNotAllowed.yaml
    "413":
      $ref: ../../components/responses/PayloadTooLarge.yaml
    "415":
      $ref: ../../components/responses/UnsupportedMediaType.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
