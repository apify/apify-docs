    - $ref: "../../components/parameters/StorageParameters.yaml#/RequestId"
  responses:
    "200":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/request-queues/RequestResponse.yaml
              - example:
                  data:
                    id: dnjkDMKLmdlkmlkmld
                    retryCount: 0
                    uniqueKey: "http://example.com"
                    url: "http://example.com"
                    method: GET
                    loadedUrl: "http://example.com/example-1"
                    payload: null
                    noRetry: false
                    errorMessages: null
                    headers: null
                    userData:
                      label: DETAIL
                      image: "https://picserver1.eu"
                    handledAt: "2019-06-16T10:23:31.607Z"
          example:
            data:
              id: dnjkDMKLmdlkmlkmld
              retryCount: 0
              uniqueKey: "http://example.com"
              url: "http://example.com"
              method: GET
              loadedUrl: "http://example.com/example-1"
              payload: null
              noRetry: false
              errorMessages: null
              headers: null
              userData:
                label: DETAIL
                image: "https://picserver1.eu"
              handledAt: "2019-06-16T10:23:31.607Z"
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "404":
      description: Not found - the requested resource was not found.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "../../components/schemas/common/errors/StorageErrors.yaml#/RequestQueueNotFoundError"
              - $ref: "../../components/schemas/common/errors/StorageErrors.yaml#/RequestNotFoundError"
  deprecated: false
  x-legacy-doc-urls:
    - https://docs.apify.com/api/v2#/reference/request-queues/queue/get-request
    - https://docs.apify.com/api/v2#/reference/request-queues/get-request
