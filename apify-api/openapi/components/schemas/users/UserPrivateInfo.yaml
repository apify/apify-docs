title: UserPrivateInfo
# The id, email, profile and createdAt fields are omitted when this endpoint is accessed
# from an Actor run, so they cannot be marked as always required (see apify-core
# src/api/src/routes/users/user.ts REMOVE_FIELDS_WHEN_ACCESSED_BY_ACTOR_RUN).
required:
  - username
  - proxy
  - plan
  - effectivePlatformFeatures
  - isPaying
type: object
properties:
  id:
    type: string
    examples: [YiKoxjkaS9gjGTqhF]
  username:
    type: string
    examples: [myusername]
  profile:
    $ref: ./Profile.yaml
  email:
    type: string
    format: email
    examples: [bob@example.com]
  proxy:
    $ref: ./Proxy.yaml
  plan:
    $ref: ./Plan.yaml
  effectivePlatformFeatures:
    $ref: ./EffectivePlatformFeatures.yaml
  createdAt:
    type: string
    format: date-time
    examples: ["2022-11-29T14:48:29.381Z"]
  isPaying:
    type: boolean
    examples: [true]
