title: WebhookRepresentation
description: |
  Minimal representation of an ad-hoc webhook attached to a single Actor run or build via the
  `webhooks` query parameter. The query parameter value is a Base64-encoded JSON array whose
  items match this schema. Persistent webhook fields (e.g. `condition`) are not used here.
required:
  - eventTypes
  - requestUrl
type: object
properties:
  eventTypes:
    type: array
    items:
      $ref: ./WebhookEventType.yaml
    examples:
      - [ACTOR.RUN.SUCCEEDED]
  requestUrl:
    type: string
    description: The URL to which the webhook sends its payload.
    examples: ["http://example.com/"]
  payloadTemplate:
    type: [string, "null"]
    description: Optional template for the JSON payload sent by the webhook.
    examples: ['{\n "userId": {{userId}}...']
  headersTemplate:
    type: [string, "null"]
    description: Optional template for the HTTP headers sent by the webhook.
    examples: ['{\n "Authorization": "Bearer ..."}']
  shouldInterpolateStrings:
    type: [boolean, "null"]
    description: Flag to also interpolate `{{...}}` variables inside string values of the payload and headers templates.
    examples: [false]
  idempotencyKey:
    type: [string, "null"]
    description: Key that prevents creating duplicate webhooks, e.g. when the run-starting request is retried.
    examples: [fdSJmdP3nfs7sfk3y]
  ignoreSslErrors:
    type: [boolean, "null"]
    description: Flag to ignore SSL errors when the webhook sends the request.
    examples: [false]
  doNotRetry:
    type: [boolean, "null"]
    description: Flag to skip retrying the webhook request on failure.
    examples: [false]
