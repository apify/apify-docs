ActorNotFoundError:
  allOf:
    - type: object
      properties:
        error:
          type: object
          properties:
            type:
              type: string
              enum: [actor-not-found]
            message:
              type: string
              enum: [Actor was not found]

ActorBuildNotFoundError:
  allOf:
    - type: object
      properties:
        error:
          type: object
          properties:
            type:
              type: string
              enum: [record-not-found]
            message:
              type: string
              enum: [Actor build was not found]

ActorRunNotFoundError:
  allOf:
    - type: object
      properties:
        error:
          type: object
          properties:
            type:
              type: string
              enum: [record-not-found]
            message:
              type: string
              enum: [Actor run was not found]

ActorRunTimeoutExceededError:
  allOf:
    - type: object
      properties:
        error:
          type: object
          properties:
            type:
              type: string
              enum: [run-timeout-exceeded]
            message:
              type: string
              pattern: '^Actor run exceeded the timeout of \d+ seconds for this API endpoint'
              example: Actor run exceeded the timeout of 300 seconds for this API endpoint

ActorRunFailedError:
  allOf:
    - type: object
      properties:
        error:
          type: object
          properties:
            type:
              type: string
              enum: [run-failed]
            message:
              type: string
              pattern: '^Actor run did not succeed \(run ID: .+, status: .+\)'
              example: "Actor run did not succeed (run ID: 55uatRrZib4xbZs, status: FAILED)"

ActorVersionNotFoundError:
  allOf:
    - type: object
      properties:
        error:
          type: object
          properties:
            type:
              type: string
              enum: [record-not-found]
            message:
              type: string
              enum: [Actor version was not found]
