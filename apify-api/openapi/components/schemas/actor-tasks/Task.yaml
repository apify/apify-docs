title: Task
required:
  - id
  - userId
  - actId
  - name
  - createdAt
  - modifiedAt
type: object
properties:
  id:
    type: string
    examples: [zdc3Pyhyz3m8vjDeM]
  userId:
    type: string
    examples: [wRsJZtadYvn4mBZmm]
  actId:
    type: string
    examples: [asADASadYvn4mBZmm]
  name:
    type: string
    examples: [my-task]
  username:
    anyOf:
      - type: string
      - type: "null"
    examples: [janedoe]
  createdAt:
    type: string
    format: date-time
    examples: ["2018-10-26T07:23:14.855Z"]
  modifiedAt:
    type: string
    format: date-time
    examples: ["2018-10-26T13:30:49.578Z"]
  removedAt:
    anyOf:
      - type: string
        format: date-time
      - type: "null"
  stats:
    anyOf:
      - $ref: ./TaskStats.yaml
      - type: "null"
  options:
    anyOf:
      - $ref: ../common/OptionalRunOptions.yaml
      - type: "null"
  input:
    anyOf:
      - type: object
        additionalProperties: true
      - type: "null"
  title:
    anyOf:
      - type: string
      - type: "null"
  actorStandby:
    anyOf:
      - $ref: ../actors/ActorStandby.yaml
      - type: "null"
  standbyUrl:
    anyOf:
      - type: string
        format: uri
      - type: "null"
