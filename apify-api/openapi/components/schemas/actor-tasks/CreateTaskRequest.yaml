title: CreateTaskRequest
required:
  - actId
type: object
properties:
  actId:
    type: string
    examples: [asADASadYvn4mBZmm]
  name:
    type: string
    examples: [my-task]
  options:
    anyOf:
      - $ref: ../common/OptionalRunOptions.yaml
      - type: "null"
  input:
    anyOf:
      - type: object
        additionalProperties: true
      - type: "null"
  title:
    anyOf:
      - type: string
      - type: "null"
  actorStandby:
    anyOf:
      - $ref: ../actors/ActorStandby.yaml
      - type: "null"
