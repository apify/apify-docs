title: CreateTaskRequest
required:
  - actId
type: object
properties:
  actId:
    type: string
    examples: [asADASadYvn4mBZmm]
  name:
    type: string
    examples: [my-task]
  options:
    anyOf:
      - $ref: ../common/TaskOptions.yaml
      - type: "null"
  input:
    anyOf:
      - $ref: ./TaskInput.yaml
      - type: "null"
  title:
    type: [string, "null"]
  actorStandby:
    anyOf:
      - $ref: ../actors/ActorStandby.yaml
      - type: "null"
