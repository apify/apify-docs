title: HeadResponse
description: Response containing requests from the request queue head without locking.
required:
  - data
type: object
properties:
  data:
    $ref: ./RequestQueueHead.yaml
example:
  data:
    limit: 1000
    queueModifiedAt: "2018-03-14T23:00:00.000Z"
    hadMultipleClients: false
    items:
      - id: 8OamqXBCpPHxyH9
        retryCount: 0
        uniqueKey: "http://example.com"
        url: "http://example.com"
        method: GET
      - id: ZJAoqlRijenMQIn
        retryCount: 0
        uniqueKey: "http://example.com/a/b"
        url: "http://example.com/a/b"
        method: GET
      - id: hAhkwyk5oOBHKQC
        retryCount: 1
        uniqueKey: "http://example.com/c/d"
        url: "http://example.com/c/d"
        method: GET
