title: RequestQueueHead
description: A batch of requests from the request queue head without locking.
type: object
required:
  - limit
  - queueModifiedAt
  - hadMultipleClients
  - items
properties:
  limit:
    $ref: ./SharedProperties.yaml#/HeadLimit
  queueModifiedAt:
    $ref: ./SharedProperties.yaml#/QueueModifiedAt
  hadMultipleClients:
    $ref: ./SharedProperties.yaml#/HadMultipleClients
  items:
    type: array
    items:
      $ref: ./HeadRequest.yaml
    description: The array of requests from the request queue head.
