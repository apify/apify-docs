title: ListOfRequestQueues
description: A paginated list of request queues.
allOf:
  - $ref: ../common/PaginationResponse.yaml
  - type: object
    required:
      - items
    properties:
      unnamed:
        type: boolean
        description: Whether the listing was filtered to only unnamed request queues.
        examples: [false]
      items:
        type: array
        description: The array of request queues.
        items:
          $ref: ./RequestQueueShort.yaml
