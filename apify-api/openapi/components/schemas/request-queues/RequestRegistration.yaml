title: RequestRegistration
description: Result of registering a request in the request queue, either by adding a new request or updating an existing one.
required:
  - requestId
  - wasAlreadyPresent
  - wasAlreadyHandled
type: object
properties:
  requestId:
    $ref: ./SharedProperties.yaml#/RequestItemId
  wasAlreadyPresent:
    $ref: ./SharedProperties.yaml#/WasAlreadyPresent
  wasAlreadyHandled:
    $ref: ./SharedProperties.yaml#/WasAlreadyHandled
