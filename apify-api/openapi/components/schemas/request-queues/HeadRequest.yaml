title: HeadRequest
description: A request from the request queue head without lock information.
type: object
required:
  - id
  - uniqueKey
  - url
properties:
  id:
    $ref: ./SharedProperties.yaml#/RequestId
  uniqueKey:
    $ref: ./SharedProperties.yaml#/UniqueKey
  url:
    type: string
    description: The URL of the request. May be truncated if it exceeds 128 characters.
    examples: [https://apify.com]
  method:
    $ref: ./SharedProperties.yaml#/RequestMethod
  retryCount:
    $ref: ./SharedProperties.yaml#/RetryCount
