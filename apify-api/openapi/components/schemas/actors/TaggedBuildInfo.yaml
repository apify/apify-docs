title: TaggedBuildInfo
description: Information about a tagged build.
type: object
properties:
  buildId:
    type: string
    description: The ID of the build associated with this tag.
    examples: [z2EryhbfhgSyqj6Hn]
  buildNumber:
    type: [string, "null"]
    pattern: ^([0-9]|[1-9][0-9])\.([0-9]|[1-9][0-9])(\.[1-9][0-9]{0,4})$
    description: The build number/version string. Can be `null` for legacy builds that lack a valid build number.
    examples: [0.0.2]
  buildNumberInt:
    type: integer
    description: The build number encoded as a single integer.
    examples: [42]
  finishedAt:
    type: [string, "null"]
    format: date-time
    description: The timestamp when the build finished.
    examples: ["2019-06-10T11:15:49.286Z"]
