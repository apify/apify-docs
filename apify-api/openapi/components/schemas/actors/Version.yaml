title: Version
type: object
required:
  - versionNumber
  - sourceType
properties:
  versionNumber:
    type: string
    examples: ["0.0"]
  sourceType:
    anyOf:
      - $ref: ./VersionSourceType.yaml
      - type: "null"
  envVars:
    description: ""
    anyOf:
      - type: array
        items:
          $ref: ./EnvVar.yaml
      - type: "null"
  applyEnvVarsToBuild:
    examples: [false]
    anyOf:
      - type: boolean
      - type: "null"
  buildTag:
    type: string
    examples: [latest]
  sourceFiles:
    $ref: ./VersionSourceFiles.yaml
  gitRepoUrl:
    description: URL of the Git repository when sourceType is GIT_REPO.
    anyOf:
      - type: string
      - type: "null"
  tarballUrl:
    description: URL of the tarball when sourceType is TARBALL.
    anyOf:
      - type: string
      - type: "null"
  gitHubGistUrl:
    description: URL of the GitHub Gist when sourceType is GITHUB_GIST.
    anyOf:
      - type: string
      - type: "null"
