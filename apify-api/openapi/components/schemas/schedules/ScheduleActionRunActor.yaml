title: ScheduleActionRunActor
required:
  - id
  - type
  - actorId
type: object
properties:
  id:
    type: string
    examples: [c6KfSgoQzFhMk3etc]
  type:
    const: RUN_ACTOR
  actorId:
    type: string
    examples: [jF8GGEvbEg4Au3NLA]
  runInput:
    anyOf:
      - $ref: ./ScheduleActionRunInput.yaml
      - type: "null"
  runOptions:
    anyOf:
      - $ref: ../common/TaskOptions.yaml
      - type: "null"
