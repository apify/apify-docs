ScheduleShort:
  title: ScheduleShort
  allOf:
    - $ref: ./ScheduleBase.yaml
    - type: object
      required:
        - actions
      properties:
        actions:
          type: array
          items:
            $ref: ./ScheduleActionShort.yaml
          description: ""

Schedule:
  title: Schedule
  allOf:
    - $ref: ./ScheduleBase.yaml
    - type: object
      required:
        - actions
      properties:
        description:
          type: [string, "null"]
          examples: [Schedule of actor ...]
        title:
          type: [string, "null"]
        notifications:
          type: object
          description: Notification settings for this schedule.
          properties:
            email:
              type: boolean
              examples: [true]
        actions:
          type: array
          items:
            $ref: ./ScheduleAction.yaml
          description: ""
