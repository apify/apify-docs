title: BuildShort
required:
  - id
  - status
  - startedAt
  - usageTotalUsd
  - buildNumber
type: object
properties:
  id:
    type: string
    examples: [HG7ML7M8z78YcAPEB]
  actId:
    type: string
    examples: [janedoe~my-actor]
  userId:
    type: string
    examples: [klmdEpoiojmdEMlk3]
  status:
    $ref: ../common/ActorJobStatus.yaml
  startedAt:
    type: string
    format: date-time
    examples: ["2019-11-30T07:34:24.202Z"]
  finishedAt:
    type: [string, "null"]
    format: date-time
    examples: ["2019-12-12T09:30:12.202Z"]
  usageTotalUsd:
    type: number
    examples: [0.02]
  buildNumber:
    type: string
    pattern: ^([0-9]|[1-9][0-9])\.([0-9]|[1-9][0-9])(\.[1-9][0-9]{0,4})?$
    examples: [0.1.1]
  buildNumberInt:
    type: integer
    examples: [10000]
  meta:
    $ref: ./BuildsMeta.yaml
