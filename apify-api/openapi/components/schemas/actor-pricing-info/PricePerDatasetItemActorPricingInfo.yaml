title: PricePerDatasetItemActorPricingInfo
allOf:
  - $ref: ./CommonActorPricingInfo.yaml
  - type: object
    required:
      - pricingModel
      - unitName
    properties:
      pricingModel:
        type: string
        const: PRICE_PER_DATASET_ITEM
      unitName:
        type: string
        description: Name of the unit that is being charged
      pricePerUnitUsd:
        type: number
        description: |
          Price per unit in USD. Mutually exclusive with `tieredPricing` - exactly one of the two is present
          on a pricing record.
      tieredPricing:
        $ref: ./TieredPricingPerDatasetItem.yaml
