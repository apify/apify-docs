title: PayPerEventActorPricingInfo
allOf:
  - $ref: ./CommonActorPricingInfo.yaml
  - type: object
    required:
      - pricingModel
    properties:
      pricingModel:
        type: string
        enum: [PAY_PER_EVENT]
      pricingPerEvent:
        type: object
        properties:
          actorChargeEvents:
            type: object
            additionalProperties:
              $ref: ./ActorChargeEvent.yaml
      minimalMaxTotalChargeUsd:
        anyOf:
          - type: number
          - type: "null"
