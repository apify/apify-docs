    "200":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../schemas/key-value-stores/RecordResponse.yaml
        "*/*":
          schema: {}
    "302":
      description: ""
      headers:
        Location:
          content:
            text/plain:
              schema:
                type: string
              example: >-
                https://apifier-key-value-store-prod.s3.amazonaws.com/tqx6jeMia43gYY6eE/INPUT?AWSAccessKeyId=NKDOUN&Expires=1502720992&Signature=DKLVPI4lDDKC
      content: {}
  deprecated: false

sharedDelete: &sharedDelete
  responses:
    <<: *commonErrors
    "204":
      $ref: ../../responses/NoContent.yaml
  deprecated: false

sharedPutPost: &sharedPutPost
  requestBody:
