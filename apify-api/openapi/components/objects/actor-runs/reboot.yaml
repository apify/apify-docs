sharedReboot: &sharedReboot
  responses:
    "200":
      description: ""
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../schemas/actor-runs/RunResponse.yaml
    "400":
      $ref: ../../responses/BadRequest.yaml
    "401":
      $ref: ../../responses/Unauthorized.yaml
    "403":
      $ref: ../../responses/Forbidden.yaml
    "404":
      $ref: ../../responses/NotFound.yaml
    "405":
      $ref: ../../responses/MethodNotAllowed.yaml
    "429":
      $ref: ../../responses/TooManyRequests.yaml
  deprecated: false

byRunId:
  <<: *sharedReboot
  tags:
    - Actor runs
  summary: Reboot run
  description: |
    Reboots an Actor run and returns an object that contains all the details
    about the rebooted run.

    Only runs that are running, i.e. runs with status `RUNNING` can be rebooted.

    The run's container will be restarted, so any data not persisted in the
    key-value store, dataset, or request queue will be lost.
  operationId: actorRun_reboot_post
  parameters:
    - $ref: "../../parameters/runAndBuildParameters.yaml#/runId"
  x-legacy-doc-urls:
    - https://docs.apify.com/api/v2#/reference/actor-runs/reboot-run/reboot-run
    - https://docs.apify.com/api/v2#/reference/actor-runs/reboot-run
    - https://docs.apify.com/api/v2#tag/Actor-runsReboot-run/operation/actorRun_reboot_post
  x-js-parent: RunClient
  x-js-name: reboot
  x-js-doc-url: https://docs.apify.com/api/client/js/reference/class/RunClient#reboot
  x-py-parent: RunClientAsync
  x-py-name: reboot
  x-py-doc-url: https://docs.apify.com/api/client/python/reference/class/RunClientAsync#reboot

lastRunByActor:
  <<: *sharedReboot
  tags:
    - Last Actor run's reboot
  summary: Reboot Actor's last run
  description: |
    Reboots the last run of the specified Actor and returns an object that
    contains all the details about the rebooted run.

    This endpoint is a shortcut for [Reboot run](#/reference/actor-runs/reboot-run/reboot-run)
    on the Actor's last run. Only runs with status `RUNNING` can be rebooted. The run's
    container will be restarted, so any data not persisted in the key-value store, dataset,
    or request queue will be lost.
  operationId: actor_runs_last_reboot_post
  parameters:
    - $ref: "../../parameters/runAndBuildParameters.yaml#/actorId"
    - $ref: "../../parameters/lastRunParameters.yaml#/status"
    - $ref: "../../parameters/lastRunParameters.yaml#/origin"

lastRunByActorTask:
  <<: *sharedReboot
  tags:
    - Last Actor task run's reboot
  summary: Reboot Actor task's last run
  description: |
    Reboots the last run of the specified Actor task and returns an object that
    contains all the details about the rebooted run.

    This endpoint is a shortcut for [Reboot run](#/reference/actor-runs/reboot-run/reboot-run)
    on the Actor task's last run. Only runs with status `RUNNING` can be rebooted. The run's
    container will be restarted, so any data not persisted in the key-value store, dataset,
    or request queue will be lost.
  operationId: actorTask_runs_last_reboot_post
  parameters:
    - $ref: "../../parameters/runAndBuildParameters.yaml#/actorTaskId"
    - $ref: "../../parameters/lastRunParameters.yaml#/status"
    - $ref: "../../parameters/lastRunParameters.yaml#/origin"
